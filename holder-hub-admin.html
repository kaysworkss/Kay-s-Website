<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Holder Hub — Admin | Kay's Works</title>
<link rel="icon" type="image/svg+xml" href="images/kaysworkslogo.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  a { color: inherit; text-decoration: none; }
  button, input, textarea, select { font: inherit; }
  *:focus-visible { outline: 2px solid var(--clay); outline-offset: 3px; border-radius: 2px; }

  :root {
    --clay:#c4845a; --rust:#9e4f2e; --sand:#e8d5b0; --linen:#f5ede0;
    --bark:#4a3228; --moss:#6b7c5c; --ash:#8a7060; --ink:#1e1410;
    --gold:#c9993a; --parchment:#ede0c8; --line:rgba(201,153,58,0.28);
    --text-muted: rgba(232,213,176,0.74);
  }
  body {
    min-height:100vh; font-family:'Crimson Pro', serif; color:var(--sand);
    background:
      radial-gradient(ellipse at 12% 80%, rgba(196,132,90,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 92% 16%, rgba(107,124,92,0.16) 0%, transparent 50%),
      var(--bark);
  }
  .eyebrow { font-family:'Cinzel',serif; letter-spacing:0.36em; text-transform:uppercase; color:var(--clay); font-size:0.68rem; }
  h1, h2, h3 { font-family:'Cormorant Garamond', serif; font-weight:300; color:var(--sand); }

  nav {
    display:flex; align-items:center; justify-content:space-between; padding:1.2rem 2.5rem;
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:50;
    background:rgba(20,14,10,0.9); backdrop-filter:blur(12px);
  }
  .nav-logo { font-family:'Cinzel',serif; font-size:0.95rem; letter-spacing:0.15em; text-transform:uppercase; display:flex; align-items:center; gap:0.6rem; }
  .nav-logo .tag { font-size:0.58rem; color:var(--gold); border:1px solid rgba(201,153,58,0.45); padding:0.25rem 0.6rem; border-radius:3px; background:rgba(201,153,58,0.08); }
  .signout-btn { display:none; cursor:pointer; background:transparent; border:1px solid var(--line); border-radius:4px; padding:0.5rem 0.8rem; color:var(--text-muted); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; }
  .signout-btn.show { display:inline-block; }
  .signout-btn:hover { border-color:var(--rust); color:#f0c8bc; }

  .page { max-width:1180px; margin:0 auto; padding:3rem 2.5rem 6rem; }

  #gate { max-width:520px; margin:5rem auto; text-align:center; }
  #gate h1 { font-size:clamp(2rem,4.4vw,2.8rem); margin:0.8rem 0 1rem; }
  #gate .lead { color:var(--text-muted); line-height:1.7; margin-bottom:2rem; }

  .panel { background:rgba(30,20,16,0.4); border:1px solid var(--line); border-radius:8px; padding:1.6rem; text-align:left; box-shadow:0 22px 70px rgba(0,0,0,0.22); }
  .panel-title { font-family:'Cinzel',serif; letter-spacing:0.24em; text-transform:uppercase; color:var(--gold); font-size:0.68rem; margin-bottom:1rem; }
  .field { margin-bottom:0.9rem; }
  label { display:block; font-family:'Cinzel',serif; letter-spacing:0.14em; text-transform:uppercase; font-size:0.58rem; color:var(--clay); margin-bottom:0.4rem; }
  input, textarea, select {
    width:100%; border:1px solid rgba(232,213,176,0.2); border-radius:5px;
    background:rgba(245,237,224,0.07); color:var(--sand); padding:0.75rem 0.9rem; outline:none;
  }
  input:focus, textarea:focus, select:focus { border-color:var(--gold); }
  textarea { min-height:90px; resize:vertical; }
  select option { background:#231510; }
  .checkbox-row { display:flex; align-items:center; gap:0.6rem; }
  .checkbox-row input { width:auto; }
  .checkbox-row label { margin:0; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; cursor:pointer;
    border-radius:5px; padding:0.75rem 1.1rem; font-family:'Cinzel',serif; letter-spacing:0.14em;
    text-transform:uppercase; font-size:0.62rem; border:1px solid rgba(200,146,42,0.55);
    background:linear-gradient(135deg,#c8922a 0%,#a97430 42%,#7a5020 68%,#d4a84b 100%); color:#fdf0d0;
  }
  .btn:hover { filter:brightness(1.08); }
  .btn.ghost { background:rgba(232,213,176,0.06); color:var(--sand); border:1px solid rgba(201,153,58,0.42); }
  .btn.danger { background:rgba(196,90,48,0.14); color:#f0c8bc; border:1px solid rgba(196,90,48,0.5); }
  .btn.small { padding:0.5rem 0.8rem; font-size:0.58rem; }
  .btn-row { display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:0.4rem; }

  .status { border:1px solid rgba(232,213,176,0.18); border-radius:6px; padding:0.8rem 1rem; color:var(--text-muted); font-size:0.9rem; margin-top:0.8rem; display:none; }
  .status.show { display:block; }
  .status.ok { border-color:rgba(107,124,92,0.85); color:#dce8d0; }
  .status.err { border-color:rgba(196,90,48,0.75); color:#f0c8bc; }

  #dashboard { display:none; }
  #dashboard.show { display:block; }
  .hub-head h1 { font-size:clamp(2rem,4vw,2.8rem); margin:0.5rem 0 2rem; }

  .tabs { display:flex; flex-wrap:wrap; gap:0.5rem; border-bottom:1px solid var(--line); margin-bottom:2rem; padding-bottom:0.9rem; }
  .tab-btn { cursor:pointer; background:transparent; border:1px solid var(--line); border-radius:20px; padding:0.55rem 1.05rem; font-family:'Cinzel',serif; letter-spacing:0.1em; text-transform:uppercase; font-size:0.6rem; color:var(--text-muted); }
  .tab-btn.active { color:#fdf0d0; border-color:var(--gold); background:rgba(201,153,58,0.16); }
  .panel-view { display:none; }
  .panel-view.show { display:block; }

  .layout-2col { display:grid; grid-template-columns: 340px 1fr; gap:1.6rem; align-items:start; }
  @media (max-width: 880px) { .layout-2col { grid-template-columns:1fr; } }

  .item-card { border:1px solid var(--line); border-radius:8px; background:rgba(30,20,16,0.3); padding:1rem 1.2rem; margin-bottom:0.8rem; }
  .item-card .item-title { font-family:'Cormorant Garamond',serif; font-size:1.25rem; margin-bottom:0.25rem; }
  .item-card .item-sub { color:var(--text-muted); font-size:0.85rem; margin-bottom:0.6rem; }
  .future-plan-editor { border:1px solid var(--line); border-radius:8px; background:rgba(30,20,16,0.3); padding:1rem; margin-bottom:0.8rem; }
  .future-plan-editor textarea { min-height:150px; }
  .badge { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.25rem 0.55rem; border-radius:12px; border:1px solid var(--line); color:var(--text-muted); }
  .badge.draft { color:#e8c9a8; border-color:rgba(201,153,58,0.5); }
  .badge.live { color:#dce8d0; border-color:rgba(107,124,92,0.7); }
  .badge.new { color:#f0c8bc; border-color:rgba(196,90,48,0.6); }

  .empty-state { color:var(--text-muted); font-style:italic; padding:1.5rem 0; text-align:center; }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">KAY'S WORKS <span class="tag">Holder Hub Admin</span></span>
  <button class="signout-btn" id="signoutBtn">Sign out</button>
</nav>

<div class="page">

  <section id="gate">
    <span class="eyebrow">Admin Only</span>
    <h1>Sign in</h1>
    <p class="lead">This is the content panel for the Àpótí Ọlọ́wẹ̀ Holder Hub.</p>
    <div class="panel">
      <div class="panel-title">Admin password</div>
      <div class="field">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginBtn" style="width:100%;">Sign in</button>
      <div class="status" id="gateStatus"></div>
    </div>
  </section>

  <section id="dashboard">
    <div class="hub-head">
      <span class="eyebrow">Holder Hub</span>
      <h1>Content Admin</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="messages">Messages</button>
      <button class="tab-btn" data-tab="reservations">Reservations</button>
      <button class="tab-btn" data-tab="notifications">Notifications</button>
      <button class="tab-btn" data-tab="participants">Participants</button>
    </div>

    <!-- MESSAGES -->
    <div class="panel-view show" id="view-messages">
      <div id="msg-list"></div>
    </div>

    <!-- RESERVATIONS -->
    <div class="panel-view" id="view-reservations">
      <div id="res-list"></div>
    </div>

    <!-- NOTIFICATIONS -->
    <div class="panel-view" id="view-notifications">
      <div class="panel">
        <div class="panel-title">Notify holders</div>
        <p style="color:var(--text-muted);line-height:1.6;margin-bottom:1rem;">Send a short email to holders who opted in, asking them to check the Holder Hub for project updates.</p>
        <div class="field">
          <label for="notifySubject">Subject</label>
          <input id="notifySubject" value="New Holder Hub update" />
        </div>
        <div class="field">
          <label for="notifyPreview">Message</label>
          <textarea id="notifyPreview">A new Holder Hub update is ready for you. Please sign in when you have a moment to read the latest project note.</textarea>
        </div>
        <button class="btn" id="sendUpdateNoticeBtn" type="button">Notify opted-in holders</button>
        <div class="status" id="updateNoticeStatus"></div>
      </div>
    </div>

    <!-- PARTICIPANTS -->
    <div class="panel-view" id="view-participants">
      <div id="part-list"></div>
    </div>

  </section>
</div>

<script>
const ADMIN_API = '/api/admin';

let adminToken = sessionStorage.getItem('holderHubAdminToken') || null;

const els = {
  gate: document.getElementById('gate'),
  dashboard: document.getElementById('dashboard'),
  passwordInput: document.getElementById('passwordInput'),
  loginBtn: document.getElementById('loginBtn'),
  gateStatus: document.getElementById('gateStatus'),
  signoutBtn: document.getElementById('signoutBtn'),
};

function setStatus(el, cls, msg) {
  el.className = 'status show' + (cls ? ' ' + cls : '');
  el.textContent = msg;
}
function esc(s) { return (s || '').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ── Boot ──
(async function init() {
  await render();
})();

async function render() {
  if (!adminToken) {
    els.gate.style.display = 'block';
    els.dashboard.classList.remove('show');
    els.signoutBtn.classList.remove('show');
    return;
  }
  // Confirm the stored token still works.
  const probe = await adminFetch('holder-messages');
  if (!probe.ok) {
    sessionStorage.removeItem('holderHubAdminToken');
    adminToken = null;
    setStatus(els.gateStatus, 'err', 'Session expired — please sign in again.');
    els.gate.style.display = 'block';
    els.dashboard.classList.remove('show');
    return;
  }
  els.gate.style.display = 'none';
  els.dashboard.classList.add('show');
  els.signoutBtn.classList.add('show');
  loadMessages();
  loadReservations();
  loadParticipants();
}

els.loginBtn.addEventListener('click', async () => {
  const password = els.passwordInput.value;
  if (!password) { setStatus(els.gateStatus, 'err', 'Enter the admin password.'); return; }
  els.loginBtn.disabled = true;
  try {
    const res = await fetch(ADMIN_API + '?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok) { setStatus(els.gateStatus, 'err', result.error || 'Incorrect password.'); return; }
    adminToken = result.token;
    sessionStorage.setItem('holderHubAdminToken', adminToken);
    els.passwordInput.value = '';
    await render();
  } finally {
    els.loginBtn.disabled = false;
  }
});
els.signoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('holderHubAdminToken');
  adminToken = null;
  window.location.reload();
});

// ── Fetch helper: action-based routing against /api/admin, x-admin-token header ──
async function adminFetch(action, options = {}) {
  const idPart = options.id ? '&id=' + encodeURIComponent(options.id) : '';
  const url = ADMIN_API + '?action=' + encodeURIComponent(action) + idPart;
  const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  if (adminToken) headers['x-admin-token'] = adminToken;
  const res = await fetch(url, {
    method: options.method || 'GET',
    headers,
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) return { ok: false, error: body.error || ('Request failed (' + res.status + ')') };
  return Object.assign({ ok: true }, Array.isArray(body) ? { rows: body } : body);
}

async function uploadImage(file, folder) {
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  return adminFetch('upload-image', {
    method: 'POST',
    body: { filename: file.name, base64, mime_type: file.type, folder }
  });
}

// ── Tabs ──
document.querySelectorAll('.tabs .tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('show'));
    document.getElementById('view-' + btn.dataset.tab).classList.add('show');
  });
});

// ══════════ RESERVATIONS ══════════
async function loadReservations() {
  const r = await adminFetch('holder-reservations');
  const listEl = document.getElementById('res-list');
  if (!r.ok) { listEl.innerHTML = '<p class="empty-state">' + esc(r.error) + '</p>'; return; }
  const rows = r.rows || [];
  listEl.innerHTML = rows.length ? rows.map(res => `
    <div class="item-card">
      <div class="item-title">${esc(res.piece_name)} <span class="badge ${res.status === 'new' ? 'new' : (res.status === 'accepted' ? 'live' : 'draft')}">${esc(res.status)}</span></div>
      <div class="item-sub">${esc(res.holders?.display_name || res.holders?.wallet_address || 'Unknown holder')} · offered ${esc(res.offer_amount)} · ${new Date(res.created_at).toLocaleString()}</div>
      ${res.note ? `<div style="margin:0.5rem 0;">${esc(res.note)}</div>` : ''}
      <div class="btn-row">
        ${res.status !== 'contacted' ? `<button class="btn ghost small" onclick="setReservationStatus('${res.id}','contacted')">Mark contacted</button>` : ''}
        ${res.status !== 'accepted' ? `<button class="btn ghost small" onclick="setReservationStatus('${res.id}','accepted')">Accept & reserve</button>` : ''}
        ${res.status !== 'declined' ? `<button class="btn danger small" onclick="setReservationStatus('${res.id}','declined')">Decline</button>` : ''}
      </div>
    </div>
  `).join('') : '<p class="empty-state">No offers yet.</p>';
}
async function setReservationStatus(id, status) {
  await adminFetch('holder-reservation', { method: 'PATCH', id, body: { status } });
  loadReservations();
}

// ══════════ MESSAGES ══════════
async function loadMessages() {
  const r = await adminFetch('holder-messages');
  const listEl = document.getElementById('msg-list');
  if (!r.ok) { listEl.innerHTML = '<p class="empty-state">' + esc(r.error) + '</p>'; return; }
  const rows = r.rows || [];
  listEl.innerHTML = rows.length ? rows.map(m => `
    <div class="item-card">
      <div class="item-title">${esc(m.subject || '(no subject)')} <span class="badge ${m.status}">${esc(m.status)}</span></div>
      <div class="item-sub">${esc(m.holders?.display_name || m.holders?.wallet_address || 'Unknown holder')} · ${new Date(m.created_at).toLocaleString()}</div>
      <div style="margin:0.5rem 0;">${esc(m.message)}</div>
      <div class="field" style="margin-top:0.9rem;">
        <label for="reply-${m.id}">Private reply to this holder</label>
        <textarea id="reply-${m.id}" placeholder="Write your reply…">${esc(m.admin_reply || '')}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn small" onclick="sendHolderReply('${m.id}')">${m.admin_reply ? 'Update reply' : 'Send reply'}</button>
        ${m.status !== 'read' ? `<button class="btn ghost small" onclick="setMsgStatus('${m.id}','read')">Mark read</button>` : ''}
        ${m.status !== 'archived' ? `<button class="btn ghost small" onclick="setMsgStatus('${m.id}','archived')">Archive</button>` : ''}
      </div>
      <div class="status" id="reply-status-${m.id}"></div>
    </div>
  `).join('') : '<p class="empty-state">No messages yet.</p>';
}
async function setMsgStatus(id, status) {
  await adminFetch('holder-message', { method: 'PATCH', id, body: { status } });
  loadMessages();
}
async function sendHolderReply(id) {
  const reply = document.getElementById('reply-' + id).value.trim();
  const status = document.getElementById('reply-status-' + id);
  if (!reply) { setStatus(status, 'err', 'Write a reply first.'); return; }
  setStatus(status, '', 'Sending…');
  const r = await adminFetch('holder-message', { method: 'PATCH', id, body: { admin_reply: reply } });
  if (!r.ok) { setStatus(status, 'err', r.error); return; }
  const confirmation = r.emailNotified
    ? 'Reply saved privately. Email alert sent to the holder.'
    : (r.notificationNote || 'Reply saved. Only this holder can see it.');
  setStatus(status, r.emailNotified ? 'ok' : '', confirmation);
  setTimeout(loadMessages, 700);
}

// ══════════ PARTICIPANTS ══════════
async function loadParticipants() {
  const r = await adminFetch('holder-participants');
  const listEl = document.getElementById('part-list');
  if (!r.ok) { listEl.innerHTML = '<p class="empty-state">' + esc(r.error) + '</p>'; return; }
  const rows = r.rows || [];
  const tierOption = (h, val, label) => `<option value="${val}" ${h.tier === val ? 'selected' : ''}>${label}</option>`;
  listEl.innerHTML = rows.length ? rows.map(h => `
    <div class="item-card">
      <div class="item-sub">${h.wallet_address} - ${esc(h.chain)} - balance ${h.token_balance} - joined ${new Date(h.created_at).toLocaleDateString()} - updates ${h.email_updates_opt_in ? 'on' : 'off'}</div>
      <div class="field" style="margin-top:0.6rem;"><label>Display name</label><input value="${esc(h.display_name || '')}" id="pname-${h.id}" /></div>
      <div class="field"><label>Tier</label>
        <select id="ptier-${h.id}">
          <option value="" ${!h.tier ? 'selected' : ''}>- none -</option>
          ${tierOption(h, 'gold', 'Gold')}
          ${tierOption(h, 'bronze', 'Bronze')}
          ${tierOption(h, 'wood', 'Wood')}
        </select>
      </div>
      <div class="checkbox-row" style="margin-bottom:0.6rem;">
        <input type="checkbox" id="ppub-${h.id}" ${h.is_public ? 'checked' : ''} />
        <label for="ppub-${h.id}">Show on public Participants list</label>
      </div>
      <div class="checkbox-row" style="margin-bottom:0.6rem;">
        <input type="checkbox" id="pupdates-${h.id}" ${h.email_updates_opt_in ? 'checked' : ''} />
        <label for="pupdates-${h.id}">Opted in to Holder Hub update emails</label>
      </div>
      <button class="btn ghost small" onclick="saveParticipant('${h.id}')">Save</button>
    </div>
  `).join('') : '<p class="empty-state">No holders yet.</p>';
}
async function saveParticipant(id) {
  const display_name = document.getElementById('pname-' + id).value.trim();
  const is_public = document.getElementById('ppub-' + id).checked;
  const email_updates_opt_in = document.getElementById('pupdates-' + id).checked;
  const tier = document.getElementById('ptier-' + id).value || null;
  await adminFetch('holder-participant', { method: 'PATCH', id, body: { display_name, is_public, tier, email_updates_opt_in } });
  loadParticipants();
}

document.getElementById('sendUpdateNoticeBtn')?.addEventListener('click', async () => {
  const btn = document.getElementById('sendUpdateNoticeBtn');
  const status = document.getElementById('updateNoticeStatus');
  const subject = document.getElementById('notifySubject').value.trim();
  const preview = document.getElementById('notifyPreview').value.trim();
  if (!subject || !preview) { setStatus(status, 'err', 'Write a subject and message first.'); return; }
  btn.disabled = true;
  setStatus(status, '', 'Sending update notice...');
  try {
    const r = await adminFetch('holder-update-notify', { method: 'POST', body: { subject, preview } });
    if (!r.ok) { setStatus(status, 'err', r.error); return; }
    const sent = Number(r.sent || 0);
    const failed = Number(r.failed || 0);
    setStatus(status, failed ? '' : 'ok', `Sent ${sent} update email${sent === 1 ? '' : 's'} to opted-in holders.${failed ? ' ' + failed + ' failed.' : ''}`);
  } finally {
    btn.disabled = false;
  }
});
// ══════════ FUTURE PLANS ══════════
let futurePlanItems = [];

function renderFuturePlanEditors() {
  const wrap = document.getElementById('futurePlansEditors');
  wrap.innerHTML = futurePlanItems.map((item, index) => `
    <div class="future-plan-editor" data-plan-index="${index}">
      <div class="field"><label>Heading</label><input class="future-plan-heading" value="${esc(item.heading || '')}" placeholder="e.g. Exhibition plans" /></div>
      <div class="field"><label>Body</label><textarea class="future-plan-body" placeholder="Write the details holders can expand…">${esc(item.body || '')}</textarea></div>
      <button class="btn danger small" type="button" onclick="removeFuturePlan(${index})">Remove</button>
    </div>
  `).join('');
}

function readFuturePlanEditors() {
  return Array.from(document.querySelectorAll('.future-plan-editor')).map(editor => ({
    heading: editor.querySelector('.future-plan-heading').value.trim(),
    body: editor.querySelector('.future-plan-body').value.trim(),
  })).filter(item => item.heading || item.body);
}

function removeFuturePlan(index) {
  futurePlanItems = readFuturePlanEditors();
  futurePlanItems.splice(index, 1);
  renderFuturePlanEditors();
}

document.getElementById('addFuturePlanBtn')?.addEventListener('click', () => {
  futurePlanItems = readFuturePlanEditors();
  futurePlanItems.push({ heading: '', body: '' });
  renderFuturePlanEditors();
});

async function loadFuturePlans() {
  const status = document.getElementById('futurePlansStatus');
  const r = await adminFetch('holder-content');
  if (!r.ok) {
    setStatus(status, 'err', r.error);
    return;
  }
  const raw = String(r.future_plans || '').trim();
  try {
    const parsed = JSON.parse(raw);
    futurePlanItems = Array.isArray(parsed.items) ? parsed.items : [];
  } catch (_) {
    futurePlanItems = raw ? [{ heading: 'Future plans', body: raw }] : [];
  }
  if (!futurePlanItems.length) futurePlanItems.push({ heading: '', body: '' });
  renderFuturePlanEditors();
  status.className = 'status';
  status.textContent = '';
}

document.getElementById('saveFuturePlansBtn')?.addEventListener('click', async () => {
  const button = document.getElementById('saveFuturePlansBtn');
  const status = document.getElementById('futurePlansStatus');
  button.disabled = true;
  setStatus(status, '', 'Saving…');
  try {
    const r = await adminFetch('holder-content', {
      method: 'POST',
      body: { future_plans: JSON.stringify({ version: 1, items: readFuturePlanEditors() }) }
    });
    if (!r.ok) {
      setStatus(status, 'err', r.error);
      return;
    }
    setStatus(status, 'ok', 'Future Plans saved and published to the Holder Hub.');
  } finally {
    button.disabled = false;
  }
});

// ══════════ Shared delete ══════════
async function deleteRow(action, id, reload) {
  if (!confirm('Delete this? This cannot be undone.')) return;
  const r = await adminFetch(action, { method: 'DELETE', id });
  if (r.ok) reload();
}
</script>
